<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
<style>.bg{fill:#f8fafc}.step{fill:#fff;stroke:#0f766e;stroke-width:2;rx:16}.warn{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:16}.txt{font-family:Arial,Helvetica,sans-serif;fill:#0f172a}.title{font-size:30px;font-weight:700}.h{font-size:18px;font-weight:700}.p{font-size:14px}.line{stroke:#334155;stroke-width:2.4;fill:none;marker-end:url(#arrow)}</style>
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker></defs>
<rect class="bg" width="1200" height="520"/><text class="txt title" x="60" y="55">Flujo de Cobro con Mercado Pago Point</text>
<rect class="step" x="60" y="110" width="190" height="90"/><text class="txt h" x="90" y="145">Orden abierta</text><text class="txt p" x="86" y="175">Items + descuentos</text>
<rect class="step" x="300" y="110" width="200" height="90"/><text class="txt h" x="325" y="145">Restante real</text><text class="txt p" x="325" y="175">Pagos validos + total</text>
<rect class="step" x="550" y="110" width="200" height="90"/><text class="txt h" x="585" y="145">Crear operacion</text><text class="txt p" x="585" y="175">Idempotency key</text>
<rect class="step" x="800" y="110" width="200" height="90"/><text class="txt h" x="835" y="145">Terminal Point</text><text class="txt p" x="835" y="175">Cliente paga</text>
<rect class="step" x="550" y="280" width="200" height="90"/><text class="txt h" x="585" y="315">Webhook/Polling</text><text class="txt p" x="585" y="345">Sin bloquear UI</text>
<rect class="step" x="300" y="280" width="200" height="90"/><text class="txt h" x="335" y="315">Aplicar pago</text><text class="txt p" x="335" y="345">Orden_pagos</text>
<rect class="step" x="60" y="280" width="190" height="90"/><text class="txt h" x="88" y="315">Voucher</text><text class="txt p" x="86" y="345">Cierre manual</text>
<rect class="warn" x="800" y="280" width="260" height="90"/><text class="txt h" x="835" y="315">Rechazo / timeout</text><text class="txt p" x="835" y="345">Liberar o reintentar</text>
<path class="line" d="M250 155 L300 155"/><path class="line" d="M500 155 L550 155"/><path class="line" d="M750 155 L800 155"/><path class="line" d="M900 200 C900 260 750 260 700 280"/><path class="line" d="M550 325 L500 325"/><path class="line" d="M300 325 L250 325"/><path class="line" d="M750 325 L800 325"/>
</svg>