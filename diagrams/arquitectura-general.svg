<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
<style>.bg{fill:#f8fafc}.box{fill:#fff;stroke:#1e3a8a;stroke-width:2;rx:18}.core{fill:#eff6ff;stroke:#1d4ed8;stroke-width:3;rx:22}.db{fill:#fef2f2;stroke:#991b1b;stroke-width:2;rx:18}.ext{fill:#ecfdf5;stroke:#047857;stroke-width:2;rx:18}.txt{font-family:Arial,Helvetica,sans-serif;fill:#0f172a}.title{font-size:32px;font-weight:700}.h{font-size:22px;font-weight:700}.p{font-size:16px}.line{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#arrow)}</style>
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker></defs>
<rect class="bg" x="0" y="0" width="1200" height="650"/>
<text class="txt title" x="60" y="60">UsielPOS - Arquitectura General</text>
<rect class="box" x="70" y="120" width="250" height="120"/>
<text class="txt h" x="100" y="165">POS Desktop</text><text class="txt p" x="100" y="195">Python + PyQt5</text><text class="txt p" x="100" y="220">Caja, pedidos, impresion</text>
<rect class="box" x="70" y="290" width="250" height="120"/>
<text class="txt h" x="100" y="335">App Movil</text><text class="txt p" x="100" y="365">Flutter + Dart</text><text class="txt p" x="100" y="390">Meseros, supervision, cobro</text>
<rect class="core" x="450" y="210" width="300" height="150"/>
<text class="txt h" x="505" y="265">API FastAPI</text><text class="txt p" x="490" y="298">Azure / Local API</text><text class="txt p" x="490" y="325">Reglas de negocio + sincronizacion</text>
<rect class="db" x="870" y="230" width="250" height="110"/>
<text class="txt h" x="920" y="275">Azure SQL</text><text class="txt p" x="905" y="306">Fuente de verdad</text>
<rect class="ext" x="850" y="80" width="270" height="95"/>
<text class="txt h" x="895" y="120">Mercado Pago Point</text><text class="txt p" x="890" y="150">Terminal fisica + webhook</text>
<rect class="ext" x="850" y="390" width="270" height="95"/>
<text class="txt h" x="910" y="430">CFDI / SAT</text><text class="txt p" x="890" y="460">Fiscal, IVA, clientes</text>
<rect class="ext" x="450" y="470" width="300" height="95"/>
<text class="txt h" x="505" y="510">Inventario / BOM</text><text class="txt p" x="490" y="540">Kardex, recetas, reversas</text>
<rect class="ext" x="70" y="470" width="250" height="95"/>
<text class="txt h" x="110" y="510">Impresion</text><text class="txt p" x="100" y="540">Cocina, barra, cuenta</text>
<path class="line" d="M320 180 C380 180 390 250 450 270"/><path class="line" d="M320 350 C380 350 390 320 450 300"/>
<path class="line" d="M750 285 L870 285"/><path class="line" d="M750 235 C800 170 800 130 850 125"/><path class="line" d="M750 335 C805 380 800 435 850 435"/>
<path class="line" d="M600 360 L600 470"/><path class="line" d="M195 410 L195 470"/>
</svg>